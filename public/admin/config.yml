backend:
  name: git-gateway
  branch: version-1.10-expanded-cms

publish_mode: editorial_workflow

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: "website_settings"
    label: "Website Settings"
    files:
      - label: "Site Info"
        name: "site_info"
        file: "public/content/site-info.json"
        format: "json"
        fields:
          - { label: "Website Name", name: "name", widget: "string" }
          - { label: "Short Name", name: "shortName", widget: "string" }
          - { label: "Logo Path", name: "logo", widget: "string" }
          - { label: "Datang.my URL", name: "datangUrl", widget: "string" }

      - label: "Forms & WhatsApp"
        name: "forms"
        file: "public/content/forms.json"
        format: "json"
        fields:
          - { label: "Student Registration Form", name: "studentRegistration", widget: "string" }
          - { label: "Career Application Form", name: "careerApplication", widget: "string" }
          - { label: "WhatsApp URL", name: "whatsappUrl", widget: "string" }

      - label: "Footer & Location"
        name: "footer"
        file: "public/content/footer.json"
        format: "json"
        fields:
          - { label: "Address", name: "address", widget: "string" }
          - { label: "Phone", name: "phone", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Map Title", name: "mapTitle", widget: "string" }
          - { label: "Google Map Embed URL", name: "googleMapEmbedUrl", widget: "text" }

  - name: "page_sections"
    label: "Page Sections"
    files:
      - label: "Hero Section"
        name: "hero"
        file: "public/content/hero.json"
        format: "json"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }
          - { label: "Primary Button Text", name: "primaryButton", widget: "string" }
          - { label: "Secondary Button Text", name: "secondaryButton", widget: "string" }

      - label: "Service Carousel"
        name: "service_posts"
        file: "public/content/service-posts.json"
        format: "json"
        fields:
          - { label: "Small Label", name: "label", widget: "string" }
          - { label: "Section Title", name: "title", widget: "string" }
          - { label: "Hint Text", name: "hint", widget: "string" }
          - label: "Posts"
            name: "posts"
            widget: "list"
            fields:
              - { label: "Post Title", name: "title", widget: "string" }
              - { label: "Post Description", name: "description", widget: "text" }
              - { label: "Image", name: "image", widget: "image" }

      - label: "Why PTPH"
        name: "why_ptph"
        file: "public/content/why-ptph.json"
        format: "json"
        fields:
          - { label: "Small Label", name: "label", widget: "string" }
          - { label: "Section Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }
          - label: "Benefit Cards"
            name: "items"
            widget: "list"
            fields:
              - { label: "Card Title", name: "title", widget: "string" }
              - { label: "Card Description", name: "description", widget: "text" }
              - { label: "Image", name: "image", widget: "image" }

      - label: "Programmes"
        name: "programmes"
        file: "public/content/programmes.json"
        format: "json"
        fields:
          - { label: "Small Label", name: "label", widget: "string" }
          - { label: "Section Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }
          - label: "Programme Cards"
            name: "items"
            widget: "list"
            fields:
              - { label: "Programme Title", name: "title", widget: "string" }
              - { label: "Programme Description", name: "description", widget: "text" }
              - label: "Subjects"
                name: "subjects"
                widget: "list"
                field: { label: "Subject", name: "subject", widget: "string" }

      - label: "Registration Section"
        name: "registration"
        file: "public/content/registration.json"
        format: "json"
        fields:
          - { label: "Small Label", name: "label", widget: "string" }
          - { label: "Section Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }
          - { label: "Form Button Text", name: "formButton", widget: "string" }
          - { label: "WhatsApp Button Text", name: "whatsappButton", widget: "string" }
          - { label: "Note", name: "note", widget: "text" }

      - label: "Join Our Team"
        name: "join_team"
        file: "public/content/join-team.json"
        format: "json"
        fields:
          - { label: "Small Label", name: "label", widget: "string" }
          - { label: "Section Title", name: "title", widget: "string" }
          - label: "Paragraphs"
            name: "paragraphs"
            widget: "list"
            field: { label: "Paragraph", name: "paragraph", widget: "text" }
          - { label: "Button Text", name: "button", widget: "string" }
          - { label: "Opportunities Title", name: "opportunitiesTitle", widget: "string" }
          - label: "Opportunities"
            name: "opportunities"
            widget: "list"
            field: { label: "Opportunity", name: "opportunity", widget: "string" }